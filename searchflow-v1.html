<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Kadhai Shorts — Search Flow</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet" />

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:             #0f0f0f;
  --surface:        #1a1a1a;
  --primary:        #cf2e4e;
  --primary-light:  #ff6b81;
  --white:          #ffffff;
  --grey:           #5c5c5c;
  --grey-text:      #929596;
  --brand-gradient: linear-gradient(135deg, #F16623 0%, #E71F2C 30%, #991C4A 100%);
}

html, body {
  height: 100%;
  overflow: hidden;
  background: #111;
  font-family: 'Roboto', sans-serif;
  color: var(--white);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

/* ═══════════════════════════════════
   DEMO BAR
════════════════════════════════════ */
.demo-bar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 42px;
  background: #0a0a0a;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 12px;
  z-index: 999;
  overflow-x: auto;
  scrollbar-width: none;
}
.demo-bar::-webkit-scrollbar { display: none; }
.demo-label {
  font-size: 11px; font-weight: 500;
  color: var(--grey-text);
  white-space: nowrap;
  flex-shrink: 0;
}
.demo-btn {
  flex-shrink: 0;
  height: 26px; padding: 0 12px;
  border-radius: 6px;
  background: #1e1e1e;
  border: 1px solid rgba(255,255,255,0.09);
  color: var(--grey-text);
  font-family: 'Roboto', sans-serif;
  font-size: 12px; font-weight: 400;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
}
.demo-btn.active {
  background: var(--brand-gradient);
  border-color: transparent;
  color: #fff;
  font-weight: 500;
}

/* ═══════════════════════════════════
   PHONE SHELL
════════════════════════════════════ */
.phone {
  max-width: 430px;
  height: calc(100svh - 42px);
  margin: 42px auto 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Status bar ── */
.status-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 24px 4px;
  flex-shrink: 0;
}
.status-bar .time { font-size: 15px; font-weight: 600; letter-spacing: 0.3px; }
.status-icons { display: flex; gap: 5px; align-items: center; }

/* ── Search header ── */
.search-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px 8px;
  flex-shrink: 0;
}
.search-back {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; cursor: pointer;
  color: var(--white);
  border-radius: 50%;
  transition: background 0.15s;
}
.search-back:active { background: rgba(255,255,255,0.08); }
.search-input-wrap {
  flex: 1;
  background: #2a2a2a;
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 6px;
  display: flex; align-items: center; gap: 8px;
  padding: 9px 12px;
  transition: border-color 0.2s ease;
}
.search-input-wrap:focus-within { border-color: rgba(207,46,78,0.7); }
.search-input {
  flex: 1;
  background: none; border: none; outline: none;
  color: var(--white);
  font-family: 'Roboto', sans-serif;
  font-size: 14px;
  caret-color: var(--primary);
}
.search-input::placeholder { color: var(--grey-text); }
.search-clear {
  width: 16px; height: 16px;
  display: none; align-items: center; justify-content: center;
  cursor: pointer; opacity: 0.5; flex-shrink: 0;
  transition: opacity 0.15s;
}
.search-clear.visible { display: flex; }
.search-clear:active { opacity: 1; }

/* ═══════════════════════════════════
   MOOD CHIPS
════════════════════════════════════ */
.mood-chips {
  display: flex; gap: 8px;
  padding: 2px 16px 10px;
  overflow-x: auto; flex-shrink: 0;
  scrollbar-width: none;
}
.mood-chips::-webkit-scrollbar { display: none; }
.mood-chip {
  flex-shrink: 0;
  height: 30px; padding: 0 14px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.14);
  background: transparent;
  color: var(--grey-text);
  font-family: 'Roboto', sans-serif;
  font-size: 13px; font-weight: 400;
  cursor: pointer;
  display: flex; align-items: center;
  white-space: nowrap;
  transition: all 0.15s ease;
}
.mood-chip.active {
  background: var(--brand-gradient);
  border-color: transparent;
  color: #fff;
  font-weight: 500;
}

/* ═══════════════════════════════════
   RESULTS CONTAINER
════════════════════════════════════ */
.search-results {
  flex: 1; overflow-y: auto;
  scrollbar-width: none;
}
.search-results::-webkit-scrollbar { display: none; }

/* ── Browse / section header ── */
.browse-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 4px 16px 14px;
  animation: fadeSlideUp 0.22s ease forwards;
}
.browse-label {
  font-size: 20px; font-weight: 600;
  color: var(--white);
}
.count-badge {
  font-size: 11px; font-weight: 500;
  color: var(--grey-text);
  background: #1e1e1e;
  border: 1px solid #2a2a2a;
  padding: 3px 10px;
  border-radius: 6px;
}

/* ── 2-col browse grid ── */
.browse-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  padding: 0 16px 80px;
}

/* ── Browse card (shared by browse, active results, more-like, trending fallback) ── */
.browse-card {
  cursor: pointer;
  border-radius: 10px;
  overflow: hidden;
  background: var(--surface);
  transition: transform 0.15s ease;
  opacity: 0;
  animation: cardPop 0.28s ease forwards;
}
.browse-card:nth-child(1) { animation-delay:   0ms; }
.browse-card:nth-child(2) { animation-delay:  45ms; }
.browse-card:nth-child(3) { animation-delay:  90ms; }
.browse-card:nth-child(4) { animation-delay: 135ms; }
.browse-card:nth-child(5) { animation-delay: 180ms; }
.browse-card:nth-child(6) { animation-delay: 225ms; }
.browse-card:nth-child(7) { animation-delay: 270ms; }
.browse-card:nth-child(8) { animation-delay: 315ms; }
.browse-card:active { transform: scale(0.97); }

.b-img-wrap {
  position: relative;
  aspect-ratio: 150 / 212;
  overflow: hidden;
}
/* shimmer before image loads */
.b-img-wrap::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.06) 50%, transparent 100%);
  transform: translateX(-100%);
  animation: shimmer-slide 1.6s ease-in-out infinite;
  z-index: 1; pointer-events: none;
}
.b-img-wrap.img-loaded::before { display: none; }
.b-img-wrap img {
  width: 100%; height: 100%;
  object-fit: cover; display: block;
  position: relative; z-index: 2;
}
.b-gradient {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.72) 0%, transparent 55%);
  z-index: 3;
}
.b-free-badge {
  position: absolute;
  top: 8px; left: 8px;
  background: rgba(0,160,68,0.95);
  color: #fff;
  font-size: 9px; font-weight: 700;
  padding: 2px 7px; border-radius: 5px;
  letter-spacing: 0.2px; z-index: 4;
}
.b-mood-badge {
  position: absolute;
  bottom: 8px; left: 8px;
  background: rgba(20,20,20,0.88);
  color: var(--primary-light);
  font-size: 10px; font-weight: 500;
  padding: 2px 7px; border-radius: 5px;
  z-index: 4;
}
.b-info { padding: 8px 8px 10px; }
.b-title {
  font-size: 13px; font-weight: 600;
  color: var(--white); line-height: 1.3;
}
.b-meta {
  font-size: 11px; font-weight: 400;
  color: var(--grey-text); margin-top: 2px;
}

/* ── More-like cards: delayed after hero section ── */
.more-like-grid .browse-card:nth-child(1) { animation-delay: 260ms; }
.more-like-grid .browse-card:nth-child(2) { animation-delay: 305ms; }
.more-like-grid .browse-card:nth-child(3) { animation-delay: 350ms; }
.more-like-grid .browse-card:nth-child(4) { animation-delay: 395ms; }

/* ── Results header ── */
.sr-results-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 4px 16px 12px;
  animation: fadeSlideUp 0.22s ease forwards;
}
.sr-results-label {
  font-size: 13px; font-weight: 400;
  color: var(--grey-text);
}
.sr-results-label strong { color: var(--white); font-weight: 600; }
.sr-count-badge {
  font-size: 11px; font-weight: 500;
  color: var(--grey-text);
  background: #1e1e1e;
  border: 1px solid #2a2a2a;
  padding: 3px 10px;
  border-radius: 6px; flex-shrink: 0;
}

/* ═══════════════════════════════════
   HERO SINGLE RESULT
════════════════════════════════════ */
.hero-wrap {
  padding: 4px 16px 0;
  animation: fadeSlideUp 0.28s ease forwards;
}
.hero-card {
  border-radius: 14px;
  overflow: hidden;
  position: relative;
  height: 240px;
  background: var(--surface);
  cursor: pointer;
}
/* shimmer before hero image loads */
.hero-card::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.06) 50%, transparent 100%);
  transform: translateX(-100%);
  animation: shimmer-slide 1.6s ease-in-out infinite;
  z-index: 1;
}
.hero-card.img-loaded::before { display: none; }
.hero-card img {
  width: 100%; height: 100%;
  object-fit: cover; object-position: top center;
  display: block;
  position: relative; z-index: 2;
}
.hero-gradient {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.1) 60%, transparent 100%);
  z-index: 3;
}
.hero-mood-chip {
  position: absolute;
  top: 12px; left: 12px;
  background: var(--brand-gradient);
  color: #fff;
  font-size: 11px; font-weight: 600;
  padding: 3px 10px; border-radius: 8px;
  z-index: 4;
}
.hero-ep-badge {
  position: absolute;
  top: 12px; right: 12px;
  background: rgba(20,20,20,0.88);
  color: var(--primary-light);
  font-size: 10px; font-weight: 500;
  padding: 3px 8px; border-radius: 6px;
  z-index: 4;
}
.hero-info {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 12px 14px; z-index: 4;
}
.hero-title {
  font-size: 20px; font-weight: 700;
  color: #fff; line-height: 1.2;
  margin-bottom: 3px;
}
.hero-meta {
  font-size: 13px; font-weight: 400;
  color: rgba(255,255,255,0.55);
}

/* ── Hero action buttons ── */
.hero-actions {
  display: flex; gap: 10px;
  padding: 12px 16px 0;
  animation: fadeSlideUp 0.28s ease 0.06s both;
}
.hero-btn-watch {
  flex: 1; height: 42px;
  background: var(--brand-gradient);
  color: #fff;
  font-family: 'Roboto', sans-serif;
  font-size: 15px; font-weight: 500;
  border: none; border-radius: 10px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: opacity 0.15s;
}
.hero-btn-watch:active { opacity: 0.8; }
.hero-btn-list {
  height: 42px; padding: 0 18px;
  background: transparent;
  color: var(--white);
  font-family: 'Roboto', sans-serif;
  font-size: 15px; font-weight: 500;
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 10px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  white-space: nowrap;
  transition: background 0.15s, border-color 0.15s;
}
.hero-btn-list:active {
  background: rgba(255,255,255,0.06);
  border-color: rgba(255,255,255,0.35);
}

/* ── More Like This ── */
.more-like-section { padding: 24px 0 0; }
.more-like-header {
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 0 16px; margin-bottom: 14px;
  animation: fadeSlideUp 0.28s ease 0.18s both;
}
.more-like-title {
  font-size: 20px; font-weight: 600;
  color: var(--white);
}
.more-like-count {
  font-size: 11px; font-weight: 400;
  color: var(--grey-text);
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
  padding: 2px 9px; border-radius: 6px;
}
.more-like-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  padding: 0 16px 80px;
}

/* ═══════════════════════════════════
   ZERO / EMPTY STATE
════════════════════════════════════ */
.zero-state {
  padding: 44px 28px 20px;
  text-align: center;
  display: flex; flex-direction: column;
  align-items: center; gap: 10px;
  animation: fadeSlideUp 0.28s ease forwards;
}
.zero-icon {
  width: 60px; height: 60px;
  background: rgba(207,46,78,0.1);
  border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 4px;
}
.zero-title {
  font-size: 16px; font-weight: 600;
  color: var(--white);
}
.zero-sub {
  font-size: 14px; font-weight: 400;
  color: var(--grey-text); line-height: 1.55;
}
.zero-sub strong { color: var(--primary-light); font-weight: 500; }

/* ── Trending fallback (inside zero state) ── */
.trending-fallback {
  padding: 4px 0 0;
  width: 100%;
  animation: fadeSlideUp 0.28s ease 0.14s both;
}
.tf-header {
  display: flex; align-items: center; gap: 7px;
  padding: 0 16px; margin-bottom: 14px;
}
.tf-title { font-size: 20px; font-weight: 600; color: var(--white); }
.tf-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  padding: 0 16px 80px;
}
/* trending fallback cards start later */
.tf-grid .browse-card:nth-child(1) { animation-delay: 200ms; }
.tf-grid .browse-card:nth-child(2) { animation-delay: 245ms; }
.tf-grid .browse-card:nth-child(3) { animation-delay: 290ms; }
.tf-grid .browse-card:nth-child(4) { animation-delay: 335ms; }

/* ═══════════════════════════════════
   SHIMMER SKELETON
════════════════════════════════════ */
@keyframes shimmer-sweep {
  0%   { background-position: 200% center; }
  100% { background-position: -200% center; }
}
@keyframes shimmer-slide {
  0%   { transform: translateX(-100%); }
  100% { transform: translateX(250%); }
}

.shimmer-wrap {
  padding: 8px 16px 0;
  animation: fadeSlideUp 0.2s ease forwards;
}
.shimmer-header-row {
  display: flex; justify-content: space-between;
  margin-bottom: 14px;
}
.shimmer-title-line {
  width: 140px; height: 20px; border-radius: 5px;
}
.shimmer-badge-line {
  width: 60px; height: 20px; border-radius: 5px;
}
.shimmer-grid-2col {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}
.shimmer-card-item { border-radius: 10px; overflow: hidden; }
.shimmer-img-area {
  aspect-ratio: 150 / 212;
  border-radius: 10px 10px 0 0;
}
.shimmer-info-area { padding: 8px; }
.shimmer-text-lg { height: 13px; margin-bottom: 6px; border-radius: 4px; }
.shimmer-text-sm { height: 11px; width: 70%; border-radius: 4px; }
.shimmer-pulse {
  background: linear-gradient(90deg, #2a2a2a 25%, #353535 50%, #2a2a2a 75%);
  background-size: 200% 100%;
  animation: shimmer-sweep 1.4s ease-in-out infinite;
}
.shimmer-card-item:nth-child(2) .shimmer-img-area { animation-delay: 0.08s; }
.shimmer-card-item:nth-child(3) .shimmer-img-area { animation-delay: 0.16s; }
.shimmer-card-item:nth-child(4) .shimmer-img-area { animation-delay: 0.12s; }

/* ═══════════════════════════════════
   ANIMATIONS
════════════════════════════════════ */
@keyframes fadeSlideUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes cardPop {
  from { opacity: 0; transform: scale(0.94) translateY(8px); }
  to   { opacity: 1; transform: scale(1)    translateY(0); }
}

/* ═══════════════════════════════════
   BOTTOM NAV
════════════════════════════════════ */
.bottom-nav {
  flex-shrink: 0;
  background: #0f0f0f;
  border-top: 1px solid rgba(255,255,255,0.09);
  display: flex; justify-content: space-around; align-items: center;
  padding: 8px 30px;
  box-shadow: 0px 1px 3px rgba(0,0,0,0.25);
}
.nav-item {
  display: flex; flex-direction: column;
  align-items: center; gap: 4px;
  cursor: pointer; flex: 1;
  color: var(--grey);
}
.nav-item.active { color: var(--primary); }
.nav-label { font-size: 16px; font-weight: 400; color: inherit; }
.nav-item .ic-solid  { display: none; }
.nav-item .ic-outline { display: inline; }
.nav-item.active .ic-solid  { display: inline; }
.nav-item.active .ic-outline { display: none; }
</style>
</head>
<body>

<!-- ── Demo scenario switcher ── -->
<div class="demo-bar">
  <span class="demo-label">Scenario:</span>
  <button class="demo-btn active" data-scenario="default">Default</button>
  <button class="demo-btn" data-scenario="multi">Multi Results</button>
  <button class="demo-btn" data-scenario="single">Single Result</button>
  <button class="demo-btn" data-scenario="zero">No Results</button>
</div>

<div class="phone">

  <!-- Status bar -->
  <div class="status-bar">
    <div class="time">9:41</div>
    <div class="status-icons">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="white">
        <rect x="0"  y="7" width="3" height="5"   rx="0.8"/>
        <rect x="4.5" y="4.5" width="3" height="7.5" rx="0.8"/>
        <rect x="9"  y="2" width="3" height="10"  rx="0.8"/>
        <rect x="13.5" y="0" width="3" height="12" rx="0.8"/>
      </svg>
      <svg width="16" height="12" viewBox="0 0 24 18" fill="white">
        <path d="M12 5a14 14 0 0110.95 5.24l-2.1 2.1A11 11 0 0012 8a11 11 0 00-8.85 4.34l-2.1-2.1A14 14 0 0112 5zm0 5a9 9 0 016.97 3.3l-2.09 2.09A6 6 0 0012 13a6 6 0 00-4.88 2.39L5.03 13.3A9 9 0 0112 10zm0 5a4 4 0 013 1.35L12 19l-3-2.65A4 4 0 0112 15z"/>
      </svg>
      <svg width="26" height="13" viewBox="0 0 26 13" fill="none">
        <rect x="0.5" y="0.5" width="22" height="12" rx="2" stroke="white" stroke-opacity="0.4"/>
        <rect x="2" y="2" width="17" height="9" rx="1.2" fill="white"/>
        <path d="M23.5 4.5v4a2 2 0 000-4z" fill="white" fill-opacity="0.4"/>
      </svg>
    </div>
  </div>

  <!-- Search header -->
  <div class="search-header">
    <div class="search-back" id="search-back">
      <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.2"
           stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
    </div>
    <div class="search-input-wrap">
      <svg width="16" height="16" fill="none" stroke="#929596" stroke-width="2.2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/>
      </svg>
      <input class="search-input" id="search-input"
             type="text" placeholder="Search stories, mood…"
             autocomplete="off" autocorrect="off" spellcheck="false"/>
      <div class="search-clear" id="search-clear">
        <svg width="14" height="14" fill="none" stroke="currentColor"
             stroke-width="2.2" stroke-linecap="round" viewBox="0 0 24 24">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </div>
    </div>
  </div>

  <!-- Mood chips -->
  <div class="mood-chips" id="mood-chips">
    <div class="mood-chip active" data-mood="All">All</div>
    <div class="mood-chip" data-mood="Romance">Romance</div>
    <div class="mood-chip" data-mood="Thriller">Thriller</div>
    <div class="mood-chip" data-mood="Comedy">Comedy</div>
    <div class="mood-chip" data-mood="Slice of Life">Slice of Life</div>
  </div>

  <!-- Results area (populated by JS) -->
  <div class="search-results" id="search-results"></div>

  <!-- Bottom nav — Explore active -->
  <div class="bottom-nav">
    <div class="nav-item">
      <svg width="24" height="24" viewBox="0 0 24 24">
        <path class="ic-solid" fill="currentColor" d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
        <path class="ic-outline" fill="none" stroke="currentColor" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round"
              d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1h-5v-6H9v6H4a1 1 0 01-1-1V9.5z"/>
      </svg>
      <span class="nav-label">Home</span>
    </div>
    <div class="nav-item active">
      <svg width="24" height="24" viewBox="0 0 24 24">
        <g class="ic-solid">
          <rect x="3" y="3" width="18" height="18" rx="2.5" fill="currentColor"/>
          <line x1="3" y1="9" x2="21" y2="9" stroke="white" stroke-width="1.4"/>
          <line x1="9" y1="3" x2="9" y2="9" stroke="white" stroke-width="1.4"/>
          <line x1="15" y1="3" x2="15" y2="9" stroke="white" stroke-width="1.4"/>
          <polygon points="10.5,13 10.5,17.5 15.5,15.25" fill="white"/>
        </g>
        <g class="ic-outline">
          <rect x="3" y="3" width="18" height="18" rx="2.5" fill="none"
                stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="3" y1="9" x2="21" y2="9" stroke="currentColor" stroke-width="1.4"/>
          <line x1="9" y1="3" x2="9" y2="9" stroke="currentColor" stroke-width="1.4"/>
          <line x1="15" y1="3" x2="15" y2="9" stroke="currentColor" stroke-width="1.4"/>
          <polygon points="10.5,13 10.5,17.5 15.5,15.25" fill="currentColor"/>
        </g>
      </svg>
      <span class="nav-label">Explore</span>
    </div>
    <div class="nav-item">
      <svg width="24" height="24" viewBox="0 0 24 24">
        <path class="ic-solid" fill="currentColor"
              d="M17 3H7a2 2 0 00-2 2v16l7-3 7 3V5a2 2 0 00-2-2z"/>
        <path class="ic-outline" fill="none" stroke="currentColor" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round"
              d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/>
      </svg>
      <span class="nav-label">My List</span>
    </div>
    <div class="nav-item">
      <svg width="24" height="24" viewBox="0 0 24 24">
        <g class="ic-solid" fill="currentColor">
          <circle cx="12" cy="7" r="4.5"/>
          <path d="M4 21a8 8 0 0116 0H4z"/>
        </g>
        <g class="ic-outline" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <circle cx="12" cy="7" r="4"/>
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        </g>
      </svg>
      <span class="nav-label">Profile</span>
    </div>
  </div>

</div><!-- /phone -->

<script>
/* ════════════════════════════════════
   DATA — 8 series (real images only)
════════════════════════════════════ */
const SERIES = [
  { title: 'Home Turf Hijinks',        image: 'assets/images/home-turf-hijinks.png',      mood: 'Comedy',        episodes: 8,  free: 5 },
  { title: 'Coastal Secrets',           image: 'assets/images/coastal-secrets.png',        mood: 'Thriller',      episodes: 10, free: 7 },
  { title: 'Love at First Sight',       image: 'assets/images/love-at-first-sight.png',    mood: 'Romance',       episodes: 12, free: 6 },
  { title: 'Wi-Fi Woes at Home',        image: 'assets/images/wifi-woes-at-home.png',      mood: 'Comedy',        episodes: 6,  free: 3 },
  { title: "Super Subbu's Challenge",   image: 'assets/images/super-subbus-challenge.png', mood: 'Comedy',        episodes: 8,  free: 4 },
  { title: 'Public Prank Party',        image: 'assets/images/public-prank-party.png',     mood: 'Comedy',        episodes: 5,  free: 5 },
  { title: 'Rainy Rendezvous',          image: 'assets/images/rainy-rendezvous.png',       mood: 'Romance',       episodes: 9,  free: 4 },
  { title: 'Kitchen Kadhai',            image: 'assets/images/kitchen-kadhai.png',         mood: 'Slice of Life', episodes: 7,  free: 3 },
];

/* ── DOM refs ── */
const srInput   = document.getElementById('search-input');
const srResults = document.getElementById('search-results');
const srClear   = document.getElementById('search-clear');
const moodChips = Array.from(document.querySelectorAll('.mood-chip'));

/* ── State ── */
let activeMood    = 'All';
let debounceTimer = null;

/* ════════════════════════════════════
   HELPERS
════════════════════════════════════ */
function getFiltered(query, mood) {
  return SERIES.filter(s => {
    const matchMood  = mood === 'All' || s.mood === mood;
    const matchQuery = !query || s.title.toLowerCase().includes(query.toLowerCase());
    return matchMood && matchQuery;
  });
}

/* Returns up to `count` series similar to `series`: same mood first, then others */
function getMoreLike(series, count = 4) {
  const sameMood = SERIES.filter(s => s !== series && s.mood === series.mood);
  const others   = SERIES.filter(s => s !== series && s.mood !== series.mood);
  return [...sameMood, ...others].slice(0, count);
}

/* Apply shimmer → fade-in on image load */
function applyImgShimmer() {
  srResults.querySelectorAll('.b-img-wrap img, .hero-card > img').forEach(img => {
    const wrap = img.closest('.b-img-wrap') || img.closest('.hero-card');
    if (!wrap) return;
    if (img.complete && img.naturalWidth > 0) {
      wrap.classList.add('img-loaded');
      return;
    }
    img.style.opacity = '0';
    const done = () => {
      img.style.transition = 'opacity 0.3s ease';
      img.style.opacity    = '1';
      wrap.classList.add('img-loaded');
    };
    img.addEventListener('load',  done, { once: true });
    img.addEventListener('error', done, { once: true });
  });
}

/* ════════════════════════════════════
   CARD TEMPLATE
════════════════════════════════════ */
function browseCardHTML(s) {
  return `<div class="browse-card" data-title="${s.title.replace(/"/g, '&quot;')}">
    <div class="b-img-wrap">
      <img src="${s.image}" alt="${s.title}" loading="lazy">
      <div class="b-gradient"></div>
      <div class="b-free-badge">${s.free} Free</div>
      <div class="b-mood-badge">${s.mood}</div>
    </div>
    <div class="b-info">
      <div class="b-title">${s.title}</div>
      <div class="b-meta">${s.episodes} Episodes</div>
    </div>
  </div>`;
}

/* ════════════════════════════════════
   RENDER: DEFAULT BROWSE STATE
   — All series in 2-col grid, mood chips filter in-place
════════════════════════════════════ */
function renderDefault() {
  const filtered = getFiltered('', activeMood);
  const label    = activeMood === 'All' ? 'Browse All' : activeMood;
  srResults.innerHTML = `
    <div class="browse-header">
      <div class="browse-label">${label}</div>
      <div class="count-badge">${filtered.length} series</div>
    </div>
    <div class="browse-grid">
      ${filtered.map(browseCardHTML).join('')}
    </div>`;
  requestAnimationFrame(applyImgShimmer);
}

/* ════════════════════════════════════
   RENDER: ACTIVE GRID (2+ results)
   — Same 2-col layout, with results header
════════════════════════════════════ */
function renderActiveGrid(results, query) {
  const label = query
    ? `results for <strong>"${query}"</strong>`
    : `<strong>${activeMood}</strong> series`;
  srResults.innerHTML = `
    <div class="sr-results-header">
      <span class="sr-results-label">${label}</span>
      <span class="sr-count-badge">${results.length} found</span>
    </div>
    <div class="browse-grid">
      ${results.map(browseCardHTML).join('')}
    </div>`;
  requestAnimationFrame(applyImgShimmer);
}

/* ════════════════════════════════════
   RENDER: HERO SINGLE RESULT (1 match)
   — Feature card + Watch/List CTAs + More Like This
════════════════════════════════════ */
function renderHeroResult(results, query) {
  const s    = results[0];
  const more = getMoreLike(s, 4);
  const label = query
    ? `result for <strong>"${query}"</strong>`
    : `<strong>${s.mood}</strong> series`;

  srResults.innerHTML = `
    <div class="sr-results-header">
      <span class="sr-results-label">1 ${label}</span>
      <span class="sr-count-badge">1 found</span>
    </div>

    <div class="hero-wrap">
      <div class="hero-card" data-title="${s.title.replace(/"/g, '&quot;')}">
        <img src="${s.image}" alt="${s.title}" loading="lazy">
        <div class="hero-gradient"></div>
        <div class="hero-mood-chip">${s.mood}</div>
        <div class="hero-ep-badge">${s.free} Free · ${s.episodes} Eps</div>
        <div class="hero-info">
          <div class="hero-title">${s.title}</div>
          <div class="hero-meta">${s.episodes} Episodes · ${s.free} Free to Watch</div>
        </div>
      </div>
    </div>

    <div class="hero-actions">
      <button type="button" class="hero-btn-watch">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
        Watch Now
      </button>
      <button type="button" class="hero-btn-list">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        My List
      </button>
    </div>

    <div class="more-like-section">
      <div class="more-like-header">
        <div class="more-like-title">More Like This</div>
        <div class="more-like-count">${more.length} series</div>
      </div>
      <div class="more-like-grid">
        ${more.map(browseCardHTML).join('')}
      </div>
    </div>`;

  requestAnimationFrame(applyImgShimmer);
}

/* ════════════════════════════════════
   RENDER: ZERO STATE (0 results)
   — Empty state + Trending Now fallback
════════════════════════════════════ */
function renderZeroState(query) {
  const fallback = SERIES.slice(0, 4);
  const msg = query
    ? `No series matching <strong>"${query}"</strong>`
    : `No <strong>${activeMood}</strong> series yet`;

  srResults.innerHTML = `
    <div class="zero-state">
      <div class="zero-icon">
        <svg width="28" height="28" fill="none" stroke="#CF2E4E"
             stroke-width="1.8" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="7"/>
          <line x1="16.5" y1="16.5" x2="22" y2="22"/>
        </svg>
      </div>
      <div class="zero-title">Nothing found</div>
      <div class="zero-sub">${msg}<br>Here's what's popular right now.</div>

      <div class="trending-fallback">
        <div class="tf-header">
          <svg width="15" height="15" viewBox="0 0 24 24">
            <defs>
              <linearGradient id="g-fire-z" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%"   stop-color="#F16623"/>
                <stop offset="35%"  stop-color="#E71F2C"/>
                <stop offset="100%" stop-color="#991C4A"/>
              </linearGradient>
            </defs>
            <path fill="url(#g-fire-z)"
              d="M13.5 0.67s.74 2.65.74 4.8c0 2.06-1.35 3.73-3.41 3.73-2.07
                 0-3.63-1.67-3.63-3.73l.03-.36C5.21 7.51 4 10.62 4 14c0 4.42
                 3.58 8 8 8s8-3.58 8-8C20 8.61 17.41 3.8 13.5.67z"/>
          </svg>
          <div class="tf-title">Trending Now</div>
        </div>
        <div class="tf-grid">
          ${fallback.map(browseCardHTML).join('')}
        </div>
      </div>
    </div>`;

  requestAnimationFrame(applyImgShimmer);
}

/* ════════════════════════════════════
   RENDER: SHIMMER SKELETON (while typing)
════════════════════════════════════ */
function showShimmer() {
  srResults.innerHTML = `
    <div class="shimmer-wrap">
      <div class="shimmer-header-row">
        <div class="shimmer-title-line shimmer-pulse"></div>
        <div class="shimmer-badge-line shimmer-pulse"></div>
      </div>
      <div class="shimmer-grid-2col">
        ${Array(4).fill(0).map(() => `
          <div class="shimmer-card-item">
            <div class="shimmer-img-area shimmer-pulse"></div>
            <div class="shimmer-info-area">
              <div class="shimmer-text-lg shimmer-pulse"></div>
              <div class="shimmer-text-sm shimmer-pulse"></div>
            </div>
          </div>`).join('')}
      </div>
    </div>`;
}

/* ════════════════════════════════════
   RENDER: MAIN DISPATCHER
════════════════════════════════════ */
function renderSearch() {
  const query    = srInput.value.trim();
  const filtered = getFiltered(query, activeMood);
  const isActive = query.length > 0 || activeMood !== 'All';

  if (!isActive)           { renderDefault();                   return; }
  if (filtered.length === 0) { renderZeroState(query);           return; }
  if (filtered.length === 1) { renderHeroResult(filtered, query); return; }
  renderActiveGrid(filtered, query);
}

/* ════════════════════════════════════
   EVENTS
════════════════════════════════════ */

/* Input: debounce → shimmer → render */
srInput.addEventListener('input', () => {
  const hasText = srInput.value.length > 0;
  srClear.classList.toggle('visible', hasText);
  clearTimeout(debounceTimer);
  if (hasText) {
    showShimmer();
    debounceTimer = setTimeout(renderSearch, 420);
  } else {
    debounceTimer = setTimeout(renderSearch, 150);
  }
});

/* Clear button */
srClear.addEventListener('click', () => {
  srInput.value = '';
  srClear.classList.remove('visible');
  clearTimeout(debounceTimer);
  renderSearch();
  srInput.focus();
});

/* Mood chips */
moodChips.forEach(chip => {
  chip.addEventListener('click', () => {
    activeMood = chip.dataset.mood;
    moodChips.forEach(c => c.classList.toggle('active', c === chip));
    clearTimeout(debounceTimer);
    renderSearch();
  });
});

/* Scroll → dismiss keyboard */
srResults.addEventListener('scroll', () => {
  if (document.activeElement === srInput) srInput.blur();
}, { passive: true });

/* ════════════════════════════════════
   DEMO SCENARIO BUTTONS
════════════════════════════════════ */
document.querySelectorAll('.demo-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.demo-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    clearTimeout(debounceTimer);

    /* reset mood to All */
    activeMood = 'All';
    moodChips.forEach(c => c.classList.toggle('active', c.dataset.mood === 'All'));

    switch (btn.dataset.scenario) {
      case 'default':
        /* Browse all 8 series */
        srInput.value = '';
        srClear.classList.remove('visible');
        renderDefault();
        break;

      case 'multi':
        /* Comedy mood → 4 results in 2-col grid */
        activeMood = 'Comedy';
        moodChips.forEach(c => c.classList.toggle('active', c.dataset.mood === 'Comedy'));
        srInput.value = '';
        srClear.classList.remove('visible');
        renderSearch();
        break;

      case 'single':
        /* "rainy" → 1 result → hero card + More Like This */
        srInput.value = 'rainy';
        srClear.classList.add('visible');
        renderSearch();
        break;

      case 'zero':
        /* "avengers" → 0 results → zero state + trending fallback */
        srInput.value = 'avengers';
        srClear.classList.add('visible');
        renderSearch();
        break;
    }
  });
});

/* ── Initial render ── */
renderDefault();
</script>
</body>
</html>
